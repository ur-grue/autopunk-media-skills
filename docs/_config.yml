title: autopunk-media-skills
description: "The most comprehensive Claude skill library for media professionals — skills for journalists, producers, podcasters, and creators."
url: "https://ur-grue.github.io"
baseurl: "/autopunk-media-skills"

markdown: kramdown
highlighter: rouge
permalink: pretty

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
