<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient with warm red glow top-right -->
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="#2a1215" stop-opacity="1"/>
      <stop offset="40%" stop-color="#1a0e0f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="1"/>
    </radialGradient>
    <!-- Red accent gradient -->
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <!-- Terminal card background -->
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <!-- Output box gradient -->
    <linearGradient id="outputBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1215" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e1012" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Sparkle top-left -->
  <g transform="translate(58, 88)" fill="none" stroke="#e74c3c" stroke-width="1.5" opacity="0.8">
    <line x1="0" y1="-12" x2="0" y2="12"/>
    <line x1="-12" y1="0" x2="12" y2="0"/>
    <line x1="-7" y1="-7" x2="7" y2="7"/>
    <line x1="7" y1="-7" x2="-7" y2="7"/>
  </g>

  <!-- Sparkle bottom-right of left section -->
  <g transform="translate(620, 480)" fill="none" stroke="#e74c3c" stroke-width="1.3" opacity="0.5">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="-10" y1="0" x2="10" y2="0"/>
    <line x1="-6" y1="-6" x2="6" y2="6"/>
    <line x1="6" y1="-6" x2="-6" y2="6"/>
  </g>

  <!-- Sparkle near terminal top-right -->
  <g transform="translate(1240, 68)" fill="none" stroke="#e74c3c" stroke-width="1.2" opacity="0.6">
    <line x1="0" y1="-8" x2="0" y2="8"/>
    <line x1="-8" y1="0" x2="8" y2="0"/>
    <line x1="-5" y1="-5" x2="5" y2="5"/>
    <line x1="5" y1="-5" x2="-5" y2="5"/>
  </g>

  <!-- Sparkle near terminal bottom-right -->
  <g transform="translate(1248, 560)" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.4">
    <line x1="0" y1="-6" x2="0" y2="6"/>
    <line x1="-6" y1="0" x2="6" y2="0"/>
    <line x1="-4" y1="-4" x2="4" y2="4"/>
    <line x1="4" y1="-4" x2="-4" y2="4"/>
  </g>

  <!-- ============ LEFT SIDE: Headline ============ -->

  <!-- "ai for media" in white -->
  <text x="60" y="200" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="#f5f5f5" letter-spacing="-1">ai for media</text>

  <!-- "that" in red -->
  <text x="460" y="200" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="#e74c3c" letter-spacing="-1">that</text>

  <!-- "matters." in red -->
  <text x="60" y="280" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="72" fill="#e74c3c" letter-spacing="-1">matters.</text>

  <!-- Subtitle -->
  <text x="60" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="20" fill="#999999" letter-spacing="0.3">354 free AI skills for TV, journalism, podcasts, and media production.</text>
  <text x="60" y="368" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="20" fill="#999999" letter-spacing="0.3">Open source on GitHub. Quality-tested.</text>

  <!-- "Get the skills" button -->
  <rect x="60" y="410" rx="8" ry="8" width="190" height="48" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <text x="103" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="17" fill="#e74c3c">Get the skills</text>

  <!-- "See how it works" button -->
  <rect x="270" y="410" rx="8" ry="8" width="210" height="48" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <text x="305" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="17" fill="#e74c3c">See how it works</text>

  <!-- Footer credit -->
  <text x="60" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="14" fill="#666666">Built by a commissioning editor with 15+ years in European public broadcasting.</text>

  <!-- ============ RIGHT SIDE: Terminal card ============ -->

  <!-- Card shadow -->
  <rect x="698" y="68" rx="12" ry="12" width="530" height="520" fill="#000000" opacity="0.3"/>

  <!-- Card body -->
  <rect x="694" y="64" rx="12" ry="12" width="530" height="520" fill="url(#termBg)" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Card title bar -->
  <rect x="694" y="64" rx="12" ry="12" width="530" height="40" fill="#333333"/>
  <rect x="694" y="92" width="530" height="12" fill="#333333"/>

  <!-- Traffic lights -->
  <circle cx="720" cy="84" r="6" fill="#ff5f57"/>
  <circle cx="740" cy="84" r="6" fill="#febc2e"/>
  <circle cx="760" cy="84" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="810" y="89" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#999999">claude — autopunk-skills</text>

  <!-- Terminal content -->
  <!-- Command line -->
  <text x="720" y="138" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="14" fill="#e74c3c">$</text>
  <text x="738" y="138" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-weight="700" font-size="14" fill="#f5f5f5">claude</text>
  <text x="800" y="138" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="14" fill="#999999">--skill tv-treatment-writer</text>

  <!-- Loading message -->
  <text x="720" y="172" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#888888">Loading skill from autopunk/media-skills...</text>

  <!-- Found message -->
  <text x="720" y="200" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#888888">Found: </text>
  <text x="800" y="200" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#e74c3c">TV Treatment Writer v2.4</text>

  <!-- Prompt -->
  <text x="720" y="244" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#e74c3c">›</text>
  <text x="738" y="244" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">Paste your brief or logline:</text>

  <!-- Input box -->
  <rect x="720" y="260" rx="6" ry="6" width="480" height="60" fill="#1a1a1a" stroke="#444444" stroke-width="1"/>
  <text x="736" y="284" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">A 3×60' docuseries following the last</text>
  <text x="736" y="304" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">generation of deep-sea pearl divers in</text>

  <!-- Processing -->
  <text x="720" y="348" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#888888">⣿ Generating treatment...</text>

  <!-- Output box -->
  <rect x="720" y="370" rx="6" ry="6" width="480" height="160" fill="url(#outputBg)" stroke="#e74c3c" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Output header -->
  <text x="830" y="395" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="12" fill="#e74c3c">— Treatment Output —</text>

  <!-- Output content -->
  <text x="740" y="420" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-weight="700" font-size="13" fill="#cccccc">Title:</text>
  <text x="800" y="420" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">The Last Breath</text>

  <text x="740" y="444" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-weight="700" font-size="13" fill="#cccccc">Format:</text>
  <text x="818" y="444" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">3 × 60 min documentary series</text>

  <text x="740" y="468" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-weight="700" font-size="13" fill="#cccccc">Logline:</text>
  <text x="826" y="468" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">In the coastal villages of Mie,</text>
  <text x="740" y="488" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">a dying tradition collides with a</text>
  <text x="740" y="508" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#cccccc">daughter's choice...</text>

  <!-- More sections note -->
  <text x="740" y="524" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="12" fill="#666666">+ 8 more sections generated</text>

  <!-- Success message -->
  <text x="720" y="562" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#28c840">✓</text>
  <text x="740" y="562" font-family="'SF Mono', 'Menlo', 'Courier New', monospace" font-size="13" fill="#888888">Treatment saved to output/treatment.md</text>
</svg>
