<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <!-- Red gradient for top accent bar -->
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="50%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <!-- Subtle radial glow -->
    <radialGradient id="glow" cx="0.15" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#2a1215" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#glow)"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#topBar)"/>

  <!-- Sparkle top-left -->
  <g transform="translate(48, 48)" fill="none" stroke="#e74c3c" stroke-width="1.5" opacity="0.7">
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="-10" y1="0" x2="10" y2="0"/>
    <line x1="-6" y1="-6" x2="6" y2="6"/>
    <line x1="6" y1="-6" x2="-6" y2="6"/>
  </g>

  <!-- Sparkle top-right -->
  <g transform="translate(1220, 52)" fill="none" stroke="#e74c3c" stroke-width="1.2" opacity="0.5">
    <line x1="0" y1="-8" x2="0" y2="8"/>
    <line x1="-8" y1="0" x2="8" y2="0"/>
    <line x1="-5" y1="-5" x2="5" y2="5"/>
    <line x1="5" y1="-5" x2="-5" y2="5"/>
  </g>

  <!-- Sparkle bottom-left -->
  <g transform="translate(100, 340)" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.4">
    <line x1="0" y1="-6" x2="0" y2="6"/>
    <line x1="-6" y1="0" x2="6" y2="0"/>
    <line x1="-4" y1="-4" x2="4" y2="4"/>
    <line x1="4" y1="-4" x2="-4" y2="4"/>
  </g>

  <!-- Sparkle bottom-right -->
  <g transform="translate(1180, 330)" fill="none" stroke="#e74c3c" stroke-width="1.3" opacity="0.6">
    <line x1="0" y1="-9" x2="0" y2="9"/>
    <line x1="-9" y1="0" x2="9" y2="0"/>
    <line x1="-6" y1="-6" x2="6" y2="6"/>
    <line x1="6" y1="-6" x2="-6" y2="6"/>
  </g>

  <!-- Wordmark: "auto" in white, "punk" in red -->
  <text
    x="60"
    y="130"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="72"
    letter-spacing="-2"
    fill="#ffffff">auto<tspan fill="#e74c3c">punk</tspan></text>

  <!-- Tagline -->
  <text
    x="62"
    y="185"
    font-family="'Georgia', 'Times New Roman', serif"
    font-weight="400"
    font-style="italic"
    font-size="32"
    fill="#f5f5f5"
    opacity="0.9">ai skills for media producers</text>

  <!-- Divider line -->
  <rect x="62" y="210" width="520" height="1" fill="#e74c3c" opacity="0.4"/>

  <!-- Subtitle -->
  <text
    x="62"
    y="248"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="20"
    letter-spacing="0.5"
    fill="#999999">229 free prompts for TV, journalism, podcasts, radio, and more.</text>

  <text
    x="62"
    y="278"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="20"
    letter-spacing="0.5"
    fill="#999999">No coding. No sign-up. Just paste and go.</text>

  <!-- Skill card preview (right side) -->
  <rect x="740" y="60" rx="12" ry="12" width="480" height="280" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>

  <!-- Card header bar -->
  <rect x="740" y="60" rx="12" ry="12" width="480" height="48" fill="#252525"/>
  <rect x="740" y="96" width="480" height="12" fill="#252525"/>

  <!-- Card red icon -->
  <rect x="760" y="72" rx="4" ry="4" width="24" height="24" fill="#e74c3c" opacity="0.9"/>
  <text x="767" y="91" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">T</text>

  <!-- Card title -->
  <text x="796" y="91" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="16" fill="#ffffff">Treatment Writer</text>

  <!-- Card close X -->
  <text x="1192" y="90" font-family="Arial, sans-serif" font-size="14" fill="#666666">x</text>

  <!-- Card label "Input" -->
  <rect x="760" y="122" rx="3" ry="3" width="46" height="18" fill="#333333"/>
  <text x="770" y="135" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#cccccc">Input</text>

  <!-- Card input text lines -->
  <rect x="760" y="150" rx="2" ry="2" width="440" height="8" fill="#333333" opacity="0.6"/>
  <rect x="760" y="164" rx="2" ry="2" width="380" height="8" fill="#333333" opacity="0.6"/>
  <rect x="760" y="178" rx="2" ry="2" width="420" height="8" fill="#333333" opacity="0.6"/>
  <rect x="760" y="192" rx="2" ry="2" width="340" height="8" fill="#333333" opacity="0.6"/>

  <!-- Card label "Output" -->
  <rect x="760" y="218" rx="3" ry="3" width="54" height="18" fill="#333333"/>
  <text x="770" y="231" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#cccccc">Output</text>

  <!-- Card output text lines -->
  <rect x="760" y="246" rx="2" ry="2" width="440" height="8" fill="#333333" opacity="0.5"/>
  <rect x="760" y="260" rx="2" ry="2" width="400" height="8" fill="#333333" opacity="0.5"/>
  <rect x="760" y="274" rx="2" ry="2" width="420" height="8" fill="#333333" opacity="0.5"/>

  <!-- Card "Send to Claude" button -->
  <rect x="760" y="296" rx="6" ry="6" width="140" height="30" fill="#e74c3c"/>
  <text x="791" y="315" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12" fill="#ffffff">Send to Claude</text>

  <!-- Card progress bar -->
  <text x="920" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666666">Progress</text>
  <rect x="985" y="306" rx="4" ry="4" width="100" height="8" fill="#333333"/>
  <rect x="985" y="306" rx="4" ry="4" width="85" height="8" fill="#e74c3c" opacity="0.8"/>
  <text x="1095" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#999999">86%</text>

  <!-- Bottom stat badges -->
  <g transform="translate(62, 340)">
    <!-- 229 stable -->
    <rect x="0" y="0" rx="4" ry="4" width="120" height="26" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
    <text x="12" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e74c3c">&#x2705;</text>
    <text x="30" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#cccccc">229 stable</text>

    <!-- 15 categories -->
    <rect x="135" y="0" rx="4" ry="4" width="130" height="26" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
    <text x="147" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e74c3c">&#x25A0;</text>
    <text x="165" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#cccccc">15 categories</text>

    <!-- G-Eval tested -->
    <rect x="280" y="0" rx="4" ry="4" width="130" height="26" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
    <text x="292" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e74c3c">&#x2B50;</text>
    <text x="310" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#cccccc">G-Eval tested</text>

    <!-- MIT license -->
    <rect x="425" y="0" rx="4" ry="4" width="110" height="26" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
    <text x="437" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e74c3c">&#x1F4C4;</text>
    <text x="455" y="17" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#cccccc">MIT license</text>
  </g>

  <!-- Bottom URL -->
  <text
    x="1218"
    y="380"
    text-anchor="end"
    font-family="'Courier New', Courier, monospace"
    font-weight="400"
    font-size="12"
    letter-spacing="0.5"
    fill="#484f58">github.com/ur-grue/autopunk-media-skills</text>
</svg>
